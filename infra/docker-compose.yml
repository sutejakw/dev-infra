services:
  mysql:
    image: mysql:8.0
    container_name: infra_mysql
    command:
      - --innodb-buffer-pool-size=128M
      - --max-connections=50
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: default_db
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_pass
    ports:
      - "3306:3306"
    volumes:
      - ./db_data/mysql:/var/lib/mysql
    networks:
      - devnet

  postgres:
    image: postgres:16
    container_name: infra_postgres
    command: >
      postgres
      -c shared_buffers=128MB
      -c max_connections=50
    restart: unless-stopped
    environment:
      POSTGRES_DB: default_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_pass
    ports:
      - "5432:5432"
    volumes:
      - ./db_data/postgre:/var/lib/postgresql/data
    networks:
      - devnet

  redis:
    image: redis:7-alpine
    container_name: infra_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./db_data/redis:/data
    command: redis-server --appendonly yes
    networks:
      - devnet

volumes:
  mysql_data:
  redis_data:

networks:
  devnet:
    driver: bridge
